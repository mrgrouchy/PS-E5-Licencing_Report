name: Feature request
description: Suggest an enhancement to reporting logic, output columns, or automation.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What gap are you trying to solve?
      placeholder: Current behavior is...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe desired behavior/output.
      placeholder: Add a column for...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you evaluated.
  - type: textarea
    id: impact
    attributes:
      label: Impact and risks
      description: Any auth/scope/performance or policy implications?
